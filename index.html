        // Fetch stock data using Yahoo Finance API alternative
        async function fetchStockData(symbol) {
            // Simulated stock data for demonstration
            // In production, you would use a real API like Alpha Vantage, Finnhub, or Yahoo Finance
            
            const data = await generateSimulatedData(symbol);
            return data;
        }

        // Generate simulated stock data
        function generateSimulatedData(symbol) {
            const days = 500;
            const data = {
                symbol: symbol,
                prices: [],
                volumes: [],
                dates: []
            };

            let basePrice = 100 + Math.random() * 400;
            const today = new Date();

            for (let i = days - 1; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                data.dates.push(date.toISOString().split('T')[0]);
                
                const change = (Math.random() - 0.48) * basePrice * 0.03;
                basePrice = Math.max(10, basePrice + change);
                data.prices.push(parseFloat(basePrice.toFixed(2)));
                data.volumes.push(Math.floor(1000000 + Math.random() * 5000000));
            }

            return data;
        }

        // Calculate technical indicators
        function calculateRSI(prices, period = 14) {
            const rsi = new Array(prices.length).fill(50);
            
            for (let i = period; i < prices.length; i++) {
                let gains = 0, losses = 0;
                
                for (let j = i - period + 1; j <= i; j++) {
                    const change = prices[j] - prices[j - 1];
                    if (change > 0) gains += change;
                    else losses -= change;
                }
                
                const avgGain = gains / period;
                const avgLoss = losses / period;
                const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                rsi[i] = 100 - (100 / (1 + rs));
            }
            
            return rsi;
        }

        function calculateMACD(prices) {
            const ema12 = calculateEMA(prices, 12);
            const ema26 = calculateEMA(prices, 26);
            const macd = ema12.map((val, i) => val - ema26[i]);
            const signal = calculateEMA(macd, 9);
            
            return { macd, signal };
        }

        function calculateEMA(prices, period) {
            const ema = new Array(prices.length);
            const multiplier = 2 / (period + 1);
            ema[0] = prices[0];
            
            for (let i = 1; i < prices.length; i++) {
                ema[i] = (prices[i] - ema[i - 1]) * multiplier + ema[i - 1];
            }
            
            return ema;
        }

        function calculateMA(prices, period) {
            const ma = new Array(prices.length);
            
            for (let i = 0; i < prices.length; i++) {
                if (i < period - 1) {
                    ma[i] = prices[i];
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += prices[i - j];
                    }
                    ma[i] = sum / period;
                }
            }
            
            return ma;
        }

        // AI Prediction using simple regression and momentum
        function predictFuturePrices(prices, days) {
            const predictions = [];
            const recentPrices = prices.slice(-60);
            
            // Calculate trend
            let trend = 0;
            for (let i = 1; i < recentPrices.length; i++) {
                trend += (recentPrices[i] - recentPrices[i - 1]) / recentPrices[i - 1];
            }
            trend = trend / (recentPrices.length - 1);
            
            // Add some randomness and momentum
            let lastPrice = prices[prices.length - 1];
            
            for (let i = 0; i < days; i++) {
                const momentum = trend * lastPrice * (1 + (Math.random() - 0.5) * 0.3);
                const volatility = lastPrice * 0.01 * (Math.random() - 0.5);
                const predicted = lastPrice + momentum + volatility;
                predictions.push(parseFloat(predicted.toFixed(2)));
                lastPrice = predicted;
            }
            
            return predictions;
        }

            const { macd, signal: macdSignal } = calculateMACD(prices);

            // Determine signal

            // Calculate confidence metrics

                <div class="result-card">
                    <h2>AI FORECAST - ${days} Days</h2>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-label">Current Price</div>
                            <div class="metric-value">${currentConfig.currency}${currentPrice.toFixed(2)}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Predicted Price (${days}d)</div>
                            <div class="metric-value">${currentConfig.currency}${predictedPrice.toFixed(2)}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Expected Change</div>
                            <div class="metric-value" style="color: ${priceChange > 0 ? '#00ff88' : '#ff4444'}">${priceChange > 0 ? '+' : ''}${priceChange.toFixed(2)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Recommendation</div>
                            <div class="signal-badge ${signalClass}">${signal}</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="forecastChart"></canvas>
                    </div>
                </div>

                <div class="result-card">
                    <h2>CONFIDENCE SYSTEM</h2>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-label">Model Accuracy</div>
                            <div class="metric-value">${accuracy.toFixed(2)}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${accuracy}%"></div>
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">RMSE</div>
                            <div class="metric-value">${currentConfig.currency}${rmse.toFixed(2)}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Error Rate</div>
                            <div class="metric-value">${((rmse / currentPrice) * 100).toFixed(2)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Confidence Level</div>
                            <div class="metric-value">${accuracy > 85 ? 'HIGH' : accuracy > 70 ? 'MODERATE' : 'LOW'}</div>
                        </div>
                    </div>
                </div>

                <div class="result-card">
                    <h2>TECHNICAL INDICATORS</h2>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-label">RSI (14)</div>
                            <div class="metric-value">${currentRSI.toFixed(2)}</div>
                            <div class="metric-label" style="margin-top: 10px">
                                ${currentRSI > 70 ? 'Overbought' : currentRSI < 30 ? 'Oversold' : 'Neutral'}
                            </div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">MACD Signal</div>
                            <div class="metric-value">${macdDiff > 0 ? 'Bullish' : 'Bearish'}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Volatility</div>
                            <div class="metric-value">${(volatility * 100).toFixed(2)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Momentum</div>
                            <div class="metric-value">${priceChange > 2 ? 'Strong Up' : priceChange < -2 ? 'Strong Down' : 'Neutral'}</div>
                        </div>
                    </div>
                </div>

                <div class="result-card">
                    <h2>PREDICTION TABLE</h2>
                    <table class="prediction-table">
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Date</th>
                                <th>Predicted Price</th>
                                <th>Expected Return</th>
                                <th>Confidence Range</th>
                            </tr>
                        </thead>
                        <tbody id="predictionTableBody">
                        </tbody>
                    </table>
                </div>

                <div class="result-card">
                    <h2>SMART DECISION - AI RECOMMENDATION</h2>
                    <div class="signal-badge ${signalClass}">${signal}</div>
                    <h3 style="color: #b794f6; margin: 20px 0;">Why This Recommendation?</h3>
                    <ul class="reasons-list" id="reasonsList">
                    </ul>
                </div>

                <div class="disclaimer">
                    <h3>DISCLAIMER</h3>
                    <p>This is an AI-based decision support tool for educational purposes. Past performance does not guarantee future results. Always conduct your own research and consult a financial advisor. Invest at your own risk.</p>
                </div>
            `;

            results.style.display = 'block';

            // Populate prediction table
            const tableBody = document.getElementById('predictionTableBody');
            const today = new Date();
            
            predictions.forEach((price, index) => {
                const futureDate = new Date(today);
                futureDate.setDate(today.getDate() + index + 1);
                const returnPct = ((price - currentPrice) / currentPrice) * 100;
                const lower = price - 1.96 * rmse;
                const upper = price + 1.96 * rmse;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>Day ${index + 1}</td>
                    <td>${futureDate.toLocaleDateString()}</td>
                    <td>${currentConfig.currency}${price.toFixed(2)}</td>
                    <td style="color: ${returnPct > 0 ? '#00ff88' : '#ff4444'}">${returnPct > 0 ? '+' : ''}${returnPct.toFixed(2)}%</td>
                    <td>${currentConfig.currency}${lower.toFixed(2)} - ${currentConfig.currency}${upper.toFixed(2)}</td>
                `;
                tableBody.appendChild(row);
            });

            // Generate reasons
            const reasonsList = document.getElementById('reasonsList');
            const reasons = generateReasons(signal, priceChange, currentRSI, macdDiff, volatility, accuracy);
            reasons.forEach(reason => {
                const li = document.createElement('li');
                li.textContent = reason;
                reasonsList.appendChild(li);
            });

            // Create forecast chart
            createForecastChart(stockData, predictions, days);
        }

        function calculateVolatility(prices) {
            const returns = [];
            for (let i = 1; i < prices.length; i++) {
                returns.push((prices[i] - prices[i - 1]) / prices[i - 1]);
            }
            
            const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
            const variance = returns.reduce((sum, ret) => sum + Math.pow(ret - mean, 2), 0) / returns.length;
            return Math.sqrt(variance);
        }

        function generateReasons(signal, priceChange, rsi, macdDiff, volatility, accuracy) {
            const reasons = [];
            
            if (Math.abs(priceChange) > 3) {
                reasons.push(`${priceChange > 0 ? 'Strong upward' : 'Strong downward'} prediction: ${priceChange > 0 ? '+' : ''}${priceChange.toFixed(2)}% expected ${priceChange > 0 ? 'return' : 'decline'}`);
            }
            
            if (rsi < 40) {
                reasons.push(`RSI at ${rsi.toFixed(1)} indicates oversold condition - potential bounce expected`);
            } else if (rsi > 70) {
                reasons.push(`RSI at ${rsi.toFixed(1)} indicates overbought condition - caution advised`);
            }
            
            if (macdDiff > 0) {
                reasons.push('MACD shows bullish crossover - positive momentum detected');
            } else {
                reasons.push('MACD shows bearish signal - negative momentum present');
            }
            
            if (volatility < 0.02) {
                reasons.push('Low volatility indicates stable, predictable movement');
            } else if (volatility > 0.04) {
                reasons.push('High volatility increases risk and uncertainty');
            }
            
            if (accuracy > 85) {
                reasons.push(`High model confidence (${accuracy.toFixed(1)}%) supports prediction reliability`);
            }
            
            return reasons.slice(0, 5);
        }

        function createForecastChart(stockData, predictions, days) {
            const ctx = document.getElementById('forecastChart').getContext('2d');
            
            const historicalDates = stockData.dates.slice(-90);
            const historicalPrices = stockData.prices.slice(-90);
            
            const futureDates = [];
            const today = new Date();
            for (let i = 1; i <= predictions.length; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                futureDates.push(date.toISOString().split('T')[0]);
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [...historicalDates, ...futureDates],
                    datasets: [
                        {
                            label: 'Historical Price',
                            data: [...historicalPrices, ...new Array(predictions.length).fill(null)],
                            borderColor: '#9d4edd',
                            backgroundColor: 'rgba(157, 78, 221, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'AI Prediction',
                            data: [...new Array(historicalPrices.length).fill(null), historicalPrices[historicalPrices.length - 1], ...predictions],
                            borderColor: predictions[predictions.length - 1] > historicalPrices[historicalPrices.length - 1] ? '#00ff88' : '#ff4444',
                            backgroundColor: 'rgba(0, 255, 136, 0.1)',
                            borderWidth: 3,
                            borderDash: [5, 5],
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0',
                                font: { size: 14 }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20, 5, 35, 0.95)',
                            titleColor: '#c77dff',
                            bodyColor: '#e0e0e0',
                            borderColor: '#9d4edd',
                            borderWidth: 2
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#b794f6', maxRotation: 45 },
                            grid: { color: 'rgba(157, 78, 221, 0.1)' }
                        },
                        y: {
                            ticks: { 
                                color: '#b794f6',
                                callback: function(value) {
                                    return currentConfig.currency + value.toFixed(2);
                                }
                            },
                            grid: { color: 'rgba(157, 78, 221, 0.1)' }
                        }
                    }
                }
            });
        }

        function displayFullAnalysis(stockData, symbol) {
            const results = document.getElementById('results');
            const prices = stockData.prices;
            const currentPrice = prices[prices.length - 1];
            const firstPrice = prices[0];
            
            // Calculate metrics
            const totalReturn = ((currentPrice - firstPrice) / firstPrice) * 100;
            const years = prices.length / 252;
            const cagr = years > 0 ? (Math.pow(currentPrice / firstPrice, 1 / years) - 1) * 100 : 0;
            
            const ma50 = calculateMA(prices, 50);
            const ma200 = calculateMA(prices, 200);
            const currentMA50 = ma50[ma50.length - 1];
            const currentMA200 = ma200[ma200.length - 1];
            
            let trend = 'Sideways/Consolidation';
            if (currentPrice > currentMA50 && currentPrice > currentMA200) {
                trend = 'Strong Uptrend';
            } else if (currentPrice < currentMA50 && currentPrice < currentMA200) {
                trend = 'Strong Downtrend';
            }
            
            results.innerHTML = `
                <div class="result-card">
                    <h2>COMPLETE COMPANY ANALYSIS</h2>
                    <div class="metrics-grid">
                        <div class="metric-item">
                            <div class="metric-label">Current Price</div>
                            <div class="metric-value">${currentConfig.currency}${currentPrice.toFixed(2)}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">CAGR</div>
                            <div class="metric-value" style="color: ${cagr > 0 ? '#00ff88' : '#ff4444'}">${cagr > 0 ? '+' : ''}${cagr.toFixed(2)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Total Return</div>
                            <div class="metric-value" style="color: ${totalReturn > 0 ? '#00ff88' : '#ff4444'}">${totalReturn > 0 ? '+' : ''}${totalReturn.toFixed(2)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Current Trend</div>
                            <div class="metric-value" style="font-size: 1.2em">${trend}</div>
                        </div>
                    </div>
                    
                    <div class="chart-container" style="height: 500px">
                        <canvas id="fullAnalysisChart"></canvas>
                    </div>
                </div>

                <div class="result-card">
                    <h2>INVESTMENT VERDICT</h2>
                    <div style="padding: 20px">
                        <h3 style="color: #c77dff; margin-bottom: 15px">Decision: ${getInvestmentVerdict(cagr, trend)}</h3>
                        <ul class="reasons-list">
                            ${getVerdictReasons(cagr, totalReturn, trend).map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="disclaimer">
                    <h3>DISCLAIMER</h3>
                    <p>This is an AI-based decision support tool for educational purposes. Past performance does not guarantee future results. Always conduct your own research and consult a financial advisor. Invest at your own risk.</p>
                </div>
            `;

            results.style.display = 'block';

            // Create full analysis chart
            createFullAnalysisChart(stockData, ma50, ma200);
        }

        function getInvestmentVerdict(cagr, trend) {
            if (cagr > 15 && trend === 'Strong Uptrend') {
                return 'LONG-TERM BUY - Strong Growth Potential';
            } else if (cagr > 8) {
                return 'HOLD - Moderate Growth with Monitoring';
            } else {
                return 'CAUTION - Consider Alternatives';
            }
        }

        function getVerdictReasons(cagr, totalReturn, trend) {
            const reasons = [];
            
            if (cagr > 15) {
                reasons.push(`Exceptional CAGR of ${cagr.toFixed(1)}% demonstrates strong consistent growth`);
            } else if (cagr > 8) {
                reasons.push(`Solid CAGR of ${cagr.toFixed(1)}% shows reliable performance`);
            } else {
                reasons.push(`Moderate CAGR of ${cagr.toFixed(1)}% suggests limited growth potential`);
            }
            
            if (totalReturn > 50) {
                reasons.push(`Strong total return of ${totalReturn.toFixed(1)}% over the period`);
            }
            
            if (trend === 'Strong Uptrend') {
                reasons.push('Currently in strong uptrend with positive momentum');
            } else if (trend === 'Strong Downtrend') {
                reasons.push('Currently in downtrend - exercise caution');
            }
            
            reasons.push('Historical performance suggests continued monitoring recommended');
            reasons.push('Diversification across sectors and regions advised');
            
            return reasons;
        }

        function createFullAnalysisChart(stockData, ma50, ma200) {
            const ctx = document.getElementById('fullAnalysisChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: stockData.dates,
                    datasets: [
                        {
                            label: 'Price',
                            data: stockData.prices,
                            borderColor: '#9d4edd',
                            backgroundColor: 'rgba(157, 78, 221, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '50-Day MA',
                            data: ma50,
                            borderColor: '#ffa500',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.4
                        },
                        {
                            label: '200-Day MA',
                            data: ma200,
                            borderColor: '#00ced1',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0',
                                font: { size: 14 }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20, 5, 35, 0.95)',
                            titleColor: '#c77dff',
                            bodyColor: '#e0e0e0',
                            borderColor: '#9d4edd',
                            borderWidth: 2
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#b794f6', maxRotation: 45, maxTicksLimit: 20 },
                            grid: { color: 'rgba(157, 78, 221, 0.1)' }
                        },
                        y: {
                            ticks: { 
                                color: '#b794f6',
                                callback: function(value) {
                                    return currentConfig.currency + value.toFixed(2);
                                }
                            },
                            grid: { color: 'rgba(157, 78, 221, 0.1)' }
                        }
                    }
                }
            });
        }
    </script>
</body>
